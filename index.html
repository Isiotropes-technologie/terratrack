<!DOCTYPE html>
<html lang="en">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
    
    body { background: radial-gradient(circle at 64% 50%, #0b1a2a 0%, #060c16 56%, #03060d 100%); color: #dbe7f0; }
    
    #container { position: relative; width: 100%; height: 100%; }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      touch-action: none;
    }
    
    canvas:active { cursor: grabbing; }
    
    .panel {
      position: absolute;
      top: 54px;
      left: 56px;
      width: 400px;
      z-index: 10;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(63, 208, 201, 0.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(63, 208, 201, 0.3); border-radius: 3px; }
    
    .status-light {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      color: #3fd0c9;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3fd0c9;
      box-shadow: 0 0 8px #3fd0c9;
      animation: blink 1.4s infinite;
    }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    
    .title { font-size: 46px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
    .subtitle { font-size: 14px; color: #7d94a8; margin-top: 12px; line-height: 1.55; }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }
    
    input {
      flex: 1;
      background: rgba(12, 26, 40, 0.85);
      border: 1px solid rgba(63, 208, 201, 0.35);
      border-radius: 9px;
      padding: 13px 14px;
      color: #eaf4f8;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
    }
    
    input::placeholder { color: #5a7184; }
    input:focus { border-color: rgba(63, 208, 201, 0.6); background: rgba(12, 26, 40, 0.95); }
    
    .track-btn {
      background: #3fd0c9;
      color: #04141a;
      border: none;
      border-radius: 9px;
      padding: 0 22px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.3s;
    }
    
    .track-btn:hover { background: #2fbfb8; transform: translateY(-2px); }
    
    .chips {
      display: flex;
      gap: 8px;
      margin-top: 11px;
      flex-wrap: wrap;
    }
    
    .chip {
      background: rgba(63, 208, 201, 0.08);
      color: #7fb8bd;
      border: 1px solid rgba(63, 208, 201, 0.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .chip:hover { background: rgba(63, 208, 201, 0.15); border-color: rgba(63, 208, 201, 0.4); }
    
    .info-panel {
      margin-top: 26px;
      background: rgba(8, 18, 30, 0.82);
      border: 1px solid rgba(63, 208, 201, 0.2);
      border-radius: 16px;
      padding: 22px;
      display: none;
    }
    
    .info-panel.active { display: block; }
    
    .info-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: #3fd0c9;
      margin-bottom: 18px;
    }
    
    .carrier-label {
      background: rgba(63, 208, 201, 0.15);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
    }
    
    .route-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0 6px;
    }
    
    .route-code { font-size: 24px; font-weight: 700; }
    .route-line { flex: 1; height: 2px; background: linear-gradient(90deg, #3fd0c9, rgba(63, 208, 201, 0.15)); }
    .route-dest { font-size: 24px; font-weight: 700; color: #7d94a8; }
    
    .city-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #7d94a8;
      margin-bottom: 20px;
    }
    
    .status-section {
      border-top: 1px solid rgba(125, 148, 168, 0.15);
      padding-top: 18px;
      margin-bottom: 18px;
    }
    
    .status-label { font-size: 11px; color: #7d94a8; font-family: 'Space Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
    .status-value { font-size: 19px; font-weight: 600; margin-top: 5px; }
    .status-detail { font-size: 13px; color: #9fb3c4; margin-top: 3px; }
    
    .progress-bar { width: 100%; height: 4px; background: rgba(63, 208, 201, 0.2); border-radius: 2px; margin: 12px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3fd0c9, #00ff88); }
    
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      font-family: 'Space Mono', monospace;
      gap: 12px;
    }
    
    .stat-col { flex: 1; }
    .stat-col.right { text-align: right; }
    .stat-title { font-size: 10px; color: #7d94a8; text-transform: uppercase; margin-bottom: 5px; }
    .stat-value { font-size: 17px; color: #eaf4f8; font-weight: 600; }
    
    .events-list {
      margin-top: 18px;
      border-top: 1px solid rgba(125, 148, 168, 0.15);
      padding-top: 12px;
      max-height: 220px;
      overflow-y: auto;
    }
    
    .event-item {
      font-size: 11px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(125, 148, 168, 0.1);
    }
    
    .event-time { color: #3fd0c9; font-weight: 600; font-family: 'Space Mono', monospace; margin-bottom: 3px; }
    .event-status { background: rgba(63, 208, 201, 0.1); color: #3fd0c9; padding: 2px 6px; border-radius: 3px; font-size: 10px; display: inline-block; margin-bottom: 4px; font-weight: 600; }
    .event-desc { color: #9fb3c4; margin-top: 2px; line-height: 1.4; }
    .event-location { color: #7d94a8; font-size: 10px; margin-top: 3px; }
    
    .legend {
      position: absolute;
      bottom: 36px;
      right: 50px;
      z-index: 10;
      display: flex;
      gap: 22px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #7d94a8;

      position: absolute;
      bottom: 36px;
      left: 56px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #5d7588;
    }

</head>

      <button class="track-btn" onclick="app.trackParcel()">Track</button>
    </div>

      <div class="info-header">

      <div class="route-bar">

        <div class="route-line"></div>
        <span class="route-dest" id="destCode"></span>
      </div>
      
      <div class="city-labels">
        <span id="originCity"></span>
        <span id="destCity"></span>
      </div>
      
      <div class="status-section">
        <div class="status-label">CURRENT STATUS</div>
        <div class="status-value" id="statusLabel"></div>
        <div class="status-detail" id="statusDetail"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      
      <div class="stats">
        <div class="stat-col">
          <div class="stat-title">PROGRESS</div>
          <div class="stat-value" id="progressValue"></div>
        </div>
        <div class="stat-col right">
          <div class="stat-title">ESTIMATED DELIVERY</div>
          <div class="stat-value" id="etaValue"></div>
        </div>
      </div>
      
      <div class="events-list" id="eventsList"></div>
    </div>
  </div>
  
  <div class="hint">⟲ Drag to rotate · 360°</div>
  
  <div class="legend">
    <span>🏭 Depot</span>
    <span>✈️ Transit</span>
    <span>📍 Current</span>
  </div>
</div>

  async init() {
    this.canvas = document.getElementById('globeCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.resizeCanvas();
    window.addEventListener('resize', () => this.resizeCanvas());
    
    this.canvas.addEventListener('pointerdown', (e) => this.onDown(e));
    this.canvas.addEventListener('pointermove', (e) => this.onMove(e));
    this.canvas.addEventListener('pointerup', (e) => this.onUp(e));
    this.canvas.addEventListener('pointerleave', (e) => this.onUp(e));
    
    document.getElementById('trackingInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.trackParcel();
    });
    
    await this.loadMap();
    this.createChips();
    this.loop();
  },
  
  resizeCanvas() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  },
  
  async loadMap() {
    try {
      const resp = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json");
      const topo = await resp.json();
      this.land = topojson.feature(topo, topo.objects.land);
    } catch (e) {
      console.error("Map load failed");
    }
  },
  
  createChips() {
    // Chips removed
  },
  
  trackParcel() {
    const input = document.getElementById('trackingInput').value.toUpperCase().trim();
    if (!input) return;
    
    const btn = document.getElementById('trackBtn');
    btn.textContent = 'Searching...';
    btn.disabled = true;
    
    this.searchTracking(input);
  },
  
  async searchTracking(trackingNumber) {
    try {
      // Détermine le carrier
      let carrier = '';
      if (trackingNumber.startsWith('CP')) {
        carrier = 'SX';
      }
      
      // Appelle la Netlify Function
      const url = `/.netlify/functions/track?number=${encodeURIComponent(trackingNumber)}&carrier=${encodeURIComponent(carrier)}`;
      const response = await fetch(url);
      const result = await response.json();
      
      if (result.success && result.data) {
        const tracking = result.data;
        
        const formattedData = {
          number: trackingNumber,
          carrier: tracking.carrier || 'Unknown',
          origin: { code: 'XX', name: 'Origin', city: tracking.origin.city || 'Unknown' },
          destination: { code: 'XX', name: 'Destination', city: tracking.destination.city || 'Unknown' },
          currentHubCode: 'XX',
          progress: tracking.progress || 50,
          currentEvent: tracking.currentEvent || {
            description: 'In Transit',
            location: 'Unknown'
          },
          estimatedDelivery: tracking.estimatedDelivery || new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toISOString(),
          events: tracking.events || []
        };
        
        this.displayTracking(formattedData);
        this.showMessage('✅ Found on 17track!', 'success');
      } else if (result.error) {
        this.showMessage('❌ ' + result.error, 'error');
        // Utilise les données démo en fallback
        const mockData = this.mockDatabase[trackingNumber];
        if (mockData) {
          this.displayTracking(mockData);
          this.showMessage('Using demo data instead', 'info');
        }
      }
    } catch (error) {
      console.error('Error:', error);
      this.showMessage('❌ Error: ' + error.message, 'error');
      
      // Utilise les données démo en fallback
      const mockData = this.mockDatabase[trackingNumber];
      if (mockData) {
        this.displayTracking(mockData);
        this.showMessage('Using demo data instead', 'info');
      }
    } finally {
      const btn = document.getElementById('trackBtn');
      btn.textContent = 'Track';
      btn.disabled = false;
    }
  },
  
  showMessage(msg, type) {
    const msgDiv = document.getElementById('messageBox') || this.createMessageBox();
    msgDiv.textContent = msg;
    msgDiv.style.color = type === 'error' ? '#ff6b6b' : (type === 'success' ? '#51cf66' : '#74c0fc');
    msgDiv.style.display = 'block';
    setTimeout(() => {
      msgDiv.style.display = 'none';
    }, 5000);
  },
  
  createMessageBox() {
    const box = document.createElement('div');
    box.id = 'messageBox';
    box.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 15px 20px; border-radius: 8px; z-index: 9999; font-size: 14px; max-width: 300px; text-align: center;';
    document.body.appendChild(box);
    return box;
  },
  
  onDown(e) {
    this.dragging = true;
    this.userControl = true;
    this._last = [e.clientX, e.clientY];
  },
  
  onMove(e) {
    if (!this.dragging) return;
    const dx = e.clientX - this._last[0];
    const dy = e.clientY - this._last[1];
    this._last = [e.clientX, e.clientY];
    this.rotate[0] += dx * 0.38;
    this.rotate[1] = Math.max(-89, Math.min(89, this.rotate[1] - dy * 0.38));
  },
  
  onUp() {
    this.dragging = false;
  },
  
  draw() {
    const ctx = this.ctx;
    const W = this.canvas.width;
    const H = this.canvas.height;
    
    if (!this.land) {
      ctx.fillStyle = "#0d3a52";
      ctx.fillRect(0, 0, W, H);
      return;
    }
    
    if (!this.userControl) {
      this.rotate[0] -= 0.12;
    }
    
    const R = Math.min(W, H) * 0.43;
    const cx = W * 0.6;
    const cy = H * 0.52;
    
    const proj = d3.geoOrthographic().scale(R).translate([cx, cy]).rotate(this.rotate).clipAngle(90);
    const path = d3.geoPath(proj, ctx);
    
    ctx.clearRect(0, 0, W, H);
    
    // Ocean
    ctx.beginPath();
    path({ type: "Sphere" });
    const g = ctx.createRadialGradient(cx - R * 0.4, cy - R * 0.4, R * 0.1, cx, cy, R);
    g.addColorStop(0, "#1d567a");
    g.addColorStop(0.55, "#0f3650");
    g.addColorStop(1, "#071a2b");
    ctx.fillStyle = g;
    ctx.fill();
    
    // Rim
    ctx.beginPath();
    path({ type: "Sphere" });
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = "rgba(63,208,201,0.45)";
    ctx.stroke();
    
    // Graticule
    ctx.beginPath();
    path(d3.geoGraticule10());
    ctx.strokeStyle = "rgba(130,185,215,0.10)";
    ctx.lineWidth = 0.6;
    ctx.stroke();
    
    // Continents
    ctx.beginPath();
    path(this.land);
    ctx.fillStyle = "rgba(34,104,108,0.62)";
    ctx.fill();
    ctx.lineWidth = 0.9;
    ctx.strokeStyle = "rgba(150,240,233,0.55)";
    ctx.stroke();
    
    // Hubs - AFFICHE UNIQUEMENT LES HUBS DU TRAJET ACTIF
    const hubsToDisplay = this.trackingData 
      ? [this.trackingData.origin.code, this.trackingData.destination.code, this.trackingData.currentHubCode]
        .filter((code, index, self) => self.indexOf(code) === index)  // Enlève les doublons
      : Object.keys(this.hubs);
    
    for (const code of hubsToDisplay) {
      const hub = this.hubs[code];
      if (!hub) continue;
      
      const xy = proj(hub.coords);
      if (!xy) continue;
      
      ctx.beginPath();
      ctx.arc(xy[0], xy[1], 5, 0, Math.PI * 2);
      ctx.fillStyle = "#3fd0c9";
      ctx.shadowColor = "#3fd0c9";
      ctx.shadowBlur = 8;
      ctx.fill();
      
      // Affiche le code ET la ville
      ctx.fillStyle = "rgba(219,231,240,0.9)";
      ctx.font = "bold 11px 'Space Mono'";
      ctx.fillText(code, xy[0] + 10, xy[1] + 2);
      
      ctx.font = "10px 'Space Grotesk'";
      ctx.fillStyle = "rgba(219,231,240,0.7)";
      ctx.fillText(hub.city, xy[0] + 10, xy[1] + 15);
    }
    
    // Route active - LINE FROM ORIGIN TO CURRENT HUB
    if (this.trackingData) {
      const origin = this.hubs[this.trackingData.origin.code];
      const dest = this.hubs[this.trackingData.destination.code];
      
      if (origin && dest) {
        // Détermine où le colis est actuellement
        const currentHubCode = this.trackingData.currentHubCode || this.trackingData.destination.code;
        const currentHub = this.hubs[currentHubCode];
        
        // Crée une interpolation de l'origine au hub actuel
        const interp = d3.geoInterpolate(origin.coords, currentHub ? currentHub.coords : dest.coords);
        
        // Dessine la ligne complète jusqu'au hub actuel
        const pts = [];
        for (let i = 0; i <= 48; i++) {
          pts.push(interp(i / 48));
        }
        
        ctx.beginPath();
        path({ type: "LineString", coordinates: pts });
        ctx.strokeStyle = "#ffd86b";  // YELLOW LINE
        ctx.lineWidth = 2.5;
        ctx.shadowColor = "transparent";
        ctx.stroke();
        
        // Current position marker - À LA LOCALISATION ACTUELLE
        let currentPos = null;
        
        if (currentHub) {
          currentPos = currentHub.coords;
        } else {
          // Fallback: interpole basé sur le progrès
          const progress = (this.trackingData.progress || 0) / 100;
          const interpFull = d3.geoInterpolate(origin.coords, dest.coords);
          currentPos = interpFull(Math.min(1, progress));
        }
        
        const xy = proj(currentPos);
        if (xy) {
          ctx.beginPath();
          ctx.arc(xy[0], xy[1], 6, 0, Math.PI * 2);
          ctx.fillStyle = "#3fd0c9";  // CYAN MARKER
          ctx.shadowColor = "#3fd0c9";
          ctx.shadowBlur = 16;
          ctx.fill();
        }
      }
    }
  },
  
  displayTracking(data) {
    this.trackingData = data;
    
    document.getElementById('trackCode').textContent = data.number;
    document.getElementById('carrierLabel').textContent = data.carrier || 'Unknown';
    document.getElementById('originCode').textContent = data.origin.code;
    document.getElementById('destCode').textContent = data.destination.code;
    document.getElementById('originCity').textContent = data.origin.name;
    document.getElementById('destCity').textContent = data.destination.name;
    
    const current = data.currentEvent || {};
    document.getElementById('statusLabel').textContent = current.description || 'In Transit';
    document.getElementById('statusDetail').textContent = current.location || '';
    
    const progress = data.progress || 0;
    document.getElementById('progressValue').textContent = progress + "%";
    document.getElementById('progressFill').style.width = progress + "%";
    
    const eta = data.estimatedDelivery ? new Date(data.estimatedDelivery).toLocaleDateString() : 'N/A';
    document.getElementById('etaValue').textContent = eta;
    
    // Events - REVERSED (recent first)
    const eventsList = document.getElementById('eventsList');
    eventsList.innerHTML = '';
    if (data.events && data.events.length > 0) {
      const reversedEvents = [...data.events].reverse();
      reversedEvents.forEach(event => {
        const div = document.createElement('div');
        div.className = 'event-item';
        const time = new Date(event.time).toLocaleString();
        div.innerHTML = `
          <div class="event-time">${time}</div>
          <span class="event-status">${event.status}</span>
          <div class="event-desc">${event.description}</div>
          <div class="event-location">📍 ${event.location}</div>
        `;
        eventsList.appendChild(div);
      });
    }
    
    document.getElementById('infoPanel').classList.add('active');
  },
  
  loop() {
    this.draw();
    requestAnimationFrame(() => this.loop());
  }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
